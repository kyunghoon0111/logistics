<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="물류관리사">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">

  <!-- Android/Chrome PWA -->
  <meta name="theme-color" content="#3B82F6">
  <link rel="manifest" href="/manifest.json">

  <title>물류관리사</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/screens.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div id="app">

    <!-- Top Header -->
    <header id="app-header" class="app-header">
      <div class="header-left">
        <span class="header-logo">물류관리사</span>
      </div>
      <div class="header-right">
        <button id="btn-search" class="icon-btn" aria-label="검색">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
        <button id="btn-dark" class="icon-btn" aria-label="다크모드 전환">
          <svg id="dark-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main id="app-main" class="app-main">
      <div id="screen-container" class="screen-container">
        <!-- 로딩 스켈레톤 -->
        <div class="loading-screen">
          <div class="loading-logo">물류관리사</div>
          <div class="loading-spinner"></div>
          <p class="loading-text">학습 데이터 불러오는 중...</p>
        </div>
      </div>
    </main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" class="bottom-nav">
      <button class="nav-item active" data-screen="home" aria-label="홈">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span class="nav-label">홈</span>
      </button>
      <button class="nav-item" data-screen="study" aria-label="개념 학습">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        <span class="nav-label">개념</span>
      </button>
      <button class="nav-item nav-item-center" data-screen="quiz" aria-label="퀴즈">
        <div class="nav-center-btn">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
        </div>
        <span class="nav-label">퀴즈</span>
      </button>
      <button class="nav-item" data-screen="progress" aria-label="진도 현황">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        <span class="nav-label">진도</span>
      </button>
      <button class="nav-item" data-screen="bookmarks" aria-label="즐겨찾기">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        <span class="nav-label">즐겨찾기</span>
      </button>
    </nav>

    <!-- Search Overlay -->
    <div id="search-overlay" class="search-overlay hidden">
      <div class="search-header">
        <div class="search-input-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="search" id="search-input" placeholder="개념, 문제 검색..." autocomplete="off" autocorrect="off" spellcheck="false">
        </div>
        <button id="search-close" class="search-cancel">취소</button>
      </div>
      <div id="search-results" class="search-results">
        <p class="search-placeholder">검색어를 입력하세요</p>
      </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div id="modal-content" class="modal-content"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
